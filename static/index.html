<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>addresswise</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f4f4;
      --panel: #ffffff;
      --ink: #111111;
      --line: #d2d2d2;
      --line-strong: #8a8a8a;
      --muted: #5f5f5f;
      --shadow: rgba(0, 0, 0, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Times New Roman", Georgia, serif;
      color: var(--ink);
      background: linear-gradient(180deg, #fafafa 0%, var(--bg) 100%);
      min-height: 100vh;
      display: grid;
      justify-items: center;
      align-items: start;
      padding: 2rem;
    }
    main {
      width: min(100%, 58rem);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 2rem;
      box-shadow: 0 1rem 2.5rem var(--shadow);
      margin-top: 2rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .intro {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }
    form {
      display: grid;
      gap: 1rem;
    }
    .field {
      display: grid;
      gap: 0.35rem;
    }
    .field-street {
      position: relative;
    }
    label {
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    input {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 0;
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--ink);
      box-shadow: 0 0 0 0.15rem rgba(0, 0, 0, 0.08);
    }
    input[readonly] {
      background: #f8f8f8;
    }
    .grid {
      display: grid;
      gap: 1rem;
    }
    @media (min-width: 640px) {
      .grid {
        grid-template-columns: minmax(0, 1fr) 12rem;
      }
    }
    .panel {
      position: absolute;
      top: calc(100% + 0.35rem);
      left: 0;
      right: 0;
      z-index: 10;
      border: 1px solid #e3e3e3;
      background: #ffffff;
      height: 14rem;
      display: none;
      grid-template-rows: minmax(0, 1fr);
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.04);
    }
    .panel.visible {
      display: grid;
    }
    .status {
      margin: 0;
      padding: 0.75rem 1rem 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .suggestions {
      list-style: none;
      padding: 0;
      margin: 0;
      overflow: auto;
      min-height: 0;
    }
    .suggestions li + li {
      border-top: 1px solid #efefef;
    }
    .suggestion {
      width: 100%;
      padding: 0.8rem 0.9rem;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }
    .suggestion:hover,
    .suggestion:focus {
      background: #f7f7f7;
      outline: none;
    }
    .suggestion strong {
      display: block;
      font-size: 0.98rem;
      font-weight: 600;
      line-height: 1.4;
    }
    .suggestion span {
      display: block;
      margin-top: 0.2rem;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main>
    <h1>addresswise</h1>
    <form id="search-form">
        <div class="field field-street">
          <label for="street-input">Street</label>
          <input id="street-input" name="q" type="text" placeholder="Type a street or address" autocomplete="street-address" spellcheck="false">
          <section class="panel" aria-label="Suggestions">
            <ul class="suggestions" id="results"></ul>
          </section>
      </div>
      <div class="grid">
        <div class="field">
          <label for="city-input">City</label>
          <input id="city-input" name="city" type="text" readonly>
        </div>
        <div class="field">
          <label for="postal-code-input">Postal code</label>
          <input id="postal-code-input" name="postal_code" type="text" readonly>
        </div>
      </div>
    </form>
  </main>
  <script>
    const form = document.getElementById("search-form");
    const streetInput = document.getElementById("street-input");
    const cityInput = document.getElementById("city-input");
    const postalCodeInput = document.getElementById("postal-code-input");
    const panel = document.querySelector(".panel");
    const results = document.getElementById("results");
    const apiBaseUrl = "https://addresswise.eu";
    const demoApiKey = __DEMO_API_KEY__;

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    let activeController = null;
    let pendingTimer = null;
    let requestSequence = 0;
    let latestResults = [];
    let latestResultsAreStreetOnly = false;
    let selectedStreet = "";

    async function runSearch(query, streetOnly) {
      if (activeController) {
        activeController.abort();
      }

      activeController = new AbortController();
      const params = new URLSearchParams({
        q: query,
        limit: "10",
        api_key: demoApiKey,
      });
      const streetOnlyFlag = streetOnly ? "&street_only" : "";
      const response = await fetch(`${apiBaseUrl}/search?${params.toString()}${streetOnlyFlag}`, {
        method: "GET",
        cache: "no-store",
        credentials: "same-origin",
        signal: activeController.signal,
      });

      if (!response.ok) {
        throw new Error(`Search failed with HTTP ${response.status}`);
      }

      return response.json();
    }

    function buildHouseNumber(address) {
      if (address.premise && address.subpremise) {
        return `${address.premise}/${address.subpremise}`;
      }

      return address.premise || address.subpremise || "";
    }

    function buildStreetLine(address) {
      return [address.thoroughfare, buildHouseNumber(address)]
        .filter(Boolean)
        .join(" ");
    }

    function fillStructuredFields(result) {
      const address = result.address;
      streetInput.value = buildStreetLine(address) || address.full_address;
      cityInput.value = address.locality || address.dependent_locality || "";
      postalCodeInput.value = address.postal_code || "";
    }

    function clearStructuredFields() {
      cityInput.value = "";
      postalCodeInput.value = "";
    }

    function focusStreetInputAtEnd() {
      streetInput.focus();
      const end = streetInput.value.length;
      streetInput.setSelectionRange(end, end);
    }

    function clearSuggestions() {
      latestResults = [];
      latestResultsAreStreetOnly = false;
      results.innerHTML = "";
      panel.classList.remove("visible");
    }

    function renderResults(payload, streetOnly) {
      latestResults = payload.results;
      latestResultsAreStreetOnly = streetOnly;
      if (!payload.results.length) {
        panel.classList.remove("visible");
        results.innerHTML = "";
        return;
      }

      panel.classList.add("visible");
      results.innerHTML = payload.results
        .map((result, index) => {
          const street = buildStreetLine(result.address) || result.address.full_address;
          const locality = [
            result.address.locality || result.address.dependent_locality || "",
            result.address.postal_code || "",
          ]
            .filter(Boolean)
            .join(", ");

          return `<li><button class="suggestion" type="button" data-index="${index}"><strong>${escapeHtml(street)}</strong><span>${escapeHtml(locality || result.address.full_address)}</span></button></li>`;
        })
        .join("");
    }

    function streetOnlyFor(query) {
      if (!selectedStreet) {
        return true;
      }

      if (query.startsWith(`${selectedStreet} `)) {
        return false;
      }

      selectedStreet = "";
      return true;
    }

    async function triggerSearch(query) {
      if (!query) {
        if (activeController) {
          activeController.abort();
          activeController = null;
        }
        selectedStreet = "";
        clearSuggestions();
        clearStructuredFields();
        return;
      }

      const currentRequest = ++requestSequence;
      const streetOnly = streetOnlyFor(query);

      try {
        const payload = await runSearch(query, streetOnly);
        if (currentRequest === requestSequence) {
          renderResults(payload, streetOnly);
        }
      } catch (error) {
        if (error.name === "AbortError") {
          return;
        }
        if (currentRequest === requestSequence) {
          clearSuggestions();
        }
      }
    }

    function scheduleSearch() {
      if (pendingTimer) {
        clearTimeout(pendingTimer);
      }

      pendingTimer = setTimeout(() => {
        pendingTimer = null;
        void triggerSearch(streetInput.value.trim());
      }, 120);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (pendingTimer) {
        clearTimeout(pendingTimer);
        pendingTimer = null;
      }
      await triggerSearch(streetInput.value.trim());
    });

    streetInput.addEventListener("input", () => {
      clearStructuredFields();
      scheduleSearch();
    });

    document.addEventListener("click", (event) => {
      if (!(event.target instanceof Element)) {
        return;
      }

      if (!event.target.closest(".field-street")) {
        clearSuggestions();
      }
    });

    results.addEventListener("click", (event) => {
      const button = event.target instanceof Element ? event.target.closest(".suggestion") : null;
      if (!button) {
        return;
      }

      const index = Number(button.dataset.index);
      const result = latestResults[index];
      if (!result) {
        return;
      }

      event.stopPropagation();

      if (latestResultsAreStreetOnly) {
        selectedStreet = result.address.thoroughfare || result.formatted;
        streetInput.value = selectedStreet;
        clearStructuredFields();
      } else {
        selectedStreet = result.address.thoroughfare || "";
        fillStructuredFields(result);
      }
      clearSuggestions();
      focusStreetInputAtEnd();
    });
  </script>
</body>
</html>
